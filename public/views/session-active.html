<!doctype html>
<html lang="en">
  <head>
    <?php include __DIR__ . '/partials/head.html'; ?>
    <link rel="stylesheet" type="text/css" href="public/styles/dashboard.css" />
    <title>Active Session — GYM TRACKER</title>
  </head>
  <body class="dashboard-body">

    <?php $currentPage = 'analytics'; include __DIR__ . '/partials/nav.html'; ?>

    <main class="dash-main">
      <div class="section-header">
        <h1>Active Session</h1>
        <form method="POST" action="/analytics/session/<?= htmlspecialchars($sessionId) ?>/end">
          <button type="submit" class="btn-danger">End Session</button>
        </form>
      </div>

      <?php foreach ($exercises as $se): ?>
        <div class="session-exercise-card">
          <h3><?= htmlspecialchars($se['exercise_name']) ?> <small>(<?= htmlspecialchars($se['muscle_group']) ?>)</small></h3>

          <?php if (!empty($se['sets'])): ?>
            <table class="sets-table">
              <thead>
                <tr><th>Set</th><th>Weight (kg)</th><th>Reps</th><th>RPE</th></tr>
              </thead>
              <tbody>
                <?php foreach ($se['sets'] as $set): ?>
                  <tr>
                    <td><?= (int)$set['set_number'] ?></td>
                    <td><?= $set['weight_kg'] ?? '—' ?></td>
                    <td><?= $set['reps']      ?? '—' ?></td>
                    <td><?= $set['rpe']       ?? '—' ?></td>
                  </tr>
                <?php endforeach; ?>
              </tbody>
            </table>
          <?php endif; ?>

          <form method="POST" action="/analytics/session/<?= htmlspecialchars($sessionId) ?>/log-set">
            <input type="hidden" name="session_exercise_id" value="<?= htmlspecialchars($se['id']) ?>" />
            <input type="hidden" name="set_number" value="<?= count($se['sets']) + 1 ?>" />
            <div class="set-inputs">
              <input type="number" name="weight_kg" placeholder="kg" step="0.5" min="0" />
              <input type="number" name="reps" placeholder="reps" min="1" />
              <input type="number" name="rpe" placeholder="RPE" min="1" max="10" />
              <button type="submit">Log Set</button>
            </div>
          </form>
        </div>
      <?php endforeach; ?>

      <div class="add-exercise-section">
        <h2>Add Exercise</h2>
        <form method="POST" action="/analytics/session/<?= htmlspecialchars($sessionId) ?>/add-exercise">
          <div class="form-group">
            <select name="exercise_id" id="exercise_id_select" required onchange="syncExerciseName(this)">
              <option value="" data-name="">— select exercise —</option>
              <?php foreach ($allExercises as $ex): ?>
                <option value="<?= htmlspecialchars($ex['id']) ?>" data-name="<?= htmlspecialchars($ex['name']) ?>">
                  <?= htmlspecialchars($ex['name']) ?> (<?= htmlspecialchars($ex['muscle_group']) ?>)
                </option>
              <?php endforeach; ?>
            </select>
            <input type="hidden" name="exercise_name" id="exercise_name_input" value="" />
            <button type="submit">Add</button>
            <script>
              function syncExerciseName(sel) {
                document.getElementById('exercise_name_input').value = sel.options[sel.selectedIndex].dataset.name;
              }
            </script>
          </div>
        </form>
      </div>
    </main>

  </body>
</html>
