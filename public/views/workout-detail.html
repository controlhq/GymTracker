<!doctype html>
<html lang="en">
  <head>

        <a href="/workouts">← Back</a>

      <p class="plan-meta">
        <?= htmlspecialchars($plan['status']) ?>

        <?= htmlspecialchars($plan['intensity']) ?>

        <table class="exercises-table">
          <thead>
            <tr>
              <th>Exercise</th>
              <th>Muscle group</th>
              <th>Sets</th>
              <th>Reps</th>
              <th>Rest (s)</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            <?php foreach ($planExercises as $pe): ?>
              <tr>
                <td><?= htmlspecialchars($pe['exercise_name']) ?></td>
                <td><?= htmlspecialchars($pe['muscle_group']) ?></td>
                <td><?= $pe['sets'] ?? '—' ?></td>
                <td><?= $pe['reps'] ?? '—' ?></td>
                <td><?= $pe['rest_sec'] ?? '—' ?></td>
                <td>
                  <form method="POST" action="/workouts/<?= htmlspecialchars($plan['id']) ?>/remove-exercise">
                    <input type="hidden" name="plan_exercise_id" value="<?= htmlspecialchars($pe['id']) ?>" />
                    <button type="submit">Remove</button>
                  </form>
                </td>
              </tr>
            <?php endforeach; ?>
          </tbody>
        </table>
      <?php endif; ?>

      <h2>Add Exercise</h2>
      <form method="POST" action="/workouts/<?= htmlspecialchars($plan['id']) ?>/add-exercise">
        <div class="form-group">
          <label for="exercise_id">Exercise</label>
          <select id="exercise_id" name="exercise_id" required>

          </select>
        </div>
        <div class="form-group">
          <label for="sets">Sets</label>
          <input type="number" id="sets" name="sets" min="1" />

          <input type="number" id="reps" name="reps" min="1" />
        </div>

          <label for="rest_sec">Rest (seconds)</label>
          <input type="number" id="rest_sec" name="rest_sec" min="0" />

        <button type="submit">Add Exercise</button>

</html>
